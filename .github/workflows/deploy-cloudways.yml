name: Deploy to Cloudways

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          CW_SSH_PRIVATE_KEY: ${{ secrets.CW_SSH_PRIVATE_KEY }}
          CW_HOST: ${{ secrets.CW_HOST }}
          CW_PASSWORD: ${{ secrets.CW_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$CW_PASSWORD" ]; then
            ssh-keyscan -H "$CW_HOST" >> ~/.ssh/known_hosts || true
            exit 0
          fi
          if [ -n "$CW_SSH_PRIVATE_KEY" ] && printf "%s" "$CW_SSH_PRIVATE_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf "%s" "$CW_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          elif [ -n "$CW_SSH_PRIVATE_KEY" ]; then
            printf "%s" "$CW_SSH_PRIVATE_KEY" | tr -d '\r\n\t ' | base64 --decode > ~/.ssh/id_ed25519
          else
            echo "Missing CW_PASSWORD or CW_SSH_PRIVATE_KEY secret"
            exit 1
          fi
          ssh-keyscan -H "$CW_HOST" >> ~/.ssh/known_hosts || true
          if [ -f ~/.ssh/id_ed25519 ]; then
            chmod 600 ~/.ssh/id_ed25519
          fi

      - name: Deploy on Cloudways
        env:
          CW_HOST: ${{ secrets.CW_HOST }}
          CW_USER: ${{ secrets.CW_USER }}
          CW_PASSWORD: ${{ secrets.CW_PASSWORD }}
          CW_APP_PATH: ${{ secrets.CW_APP_PATH }}
        run: |
          REMOTE_CMD='set -e; cd "'"$CW_APP_PATH"'"; git pull origin main; composer install --no-dev --optimize-autoloader --no-interaction; php artisan migrate --force; php artisan optimize:clear'
          if [ -n "$CW_PASSWORD" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
            sshpass -p "$CW_PASSWORD" ssh -o StrictHostKeyChecking=no "$CW_USER@$CW_HOST" "$REMOTE_CMD"
          else
            ssh -i ~/.ssh/id_ed25519 "$CW_USER@$CW_HOST" "$REMOTE_CMD"
          fi
